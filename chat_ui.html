<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding Chat</title>
<script>
  // 테마 flicker 방지: body 렌더 전에 저장된 설정(또는 OS 선호)으로 light 클래스 선적용.
  (function () {
    try {
      var user = localStorage.getItem('vibe_auth_user') || '_guest';
      var raw = localStorage.getItem('vibe_chat_state_' + user);
      var pref = 'system';
      if (raw) {
        var s = JSON.parse(raw);
        if (s && s.settings && s.settings.theme) pref = s.settings.theme;
      }
      var isLight = pref === 'light' || (
        pref === 'system' &&
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: light)').matches
      );
      if (isLight) document.documentElement.classList.add('light');
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="/assets/main.css">
<!-- highlight.js (VSCode-like syntax coloring). CDN; 오프라인이면 폴백 하이라이터가 동작합니다. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/vs2015.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<!-- KaTeX (수식) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<!-- Mermaid (다이어그램) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<!-- Monaco Editor loader (코드 IDE 미리보기) -->
</head>
<body>

<!-- ════════ Login Overlay ════════ -->
<div id="login-overlay">
  <form class="login-card" id="login-form" autocomplete="on" onsubmit="handleLogin(event); return false;">
    <h1>Vibe Coding</h1>
    <p>로그인하여 시작하세요</p>
    <label for="login-username">아이디</label>
    <input id="login-username" name="username" type="text" autocomplete="username" required>
    <label for="login-password">비밀번호</label>
    <input id="login-password" name="password" type="password" autocomplete="current-password" required>
    <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
    <button type="submit" id="login-submit">로그인</button>
    <div class="login-switch">계정이 없으신가요? <button type="button" class="link-btn" onclick="showSignup()">회원가입</button></div>
  </form>

  <form class="login-card is-hidden" id="signup-form" autocomplete="off" onsubmit="handleSignup(event); return false;">
    <h1>Vibe Coding</h1>
    <p>새 계정을 만드세요</p>
    <label for="signup-username">아이디</label>
    <input id="signup-username" name="username" type="text" required>
    <label for="signup-password">비밀번호</label>
    <input id="signup-password" name="password" type="password" required>
    <label for="signup-password2">비밀번호 확인</label>
    <input id="signup-password2" name="password2" type="password" required>
    <div class="login-error" id="signup-error" role="alert" aria-live="polite"></div>
    <button type="submit" id="signup-submit">회원가입</button>
    <div class="login-switch">이미 계정이 있으신가요? <button type="button" class="link-btn" onclick="showLogin()">로그인</button></div>
  </form>
</div>

<!-- Mobile menu button + sidebar backdrop -->
<button class="mobile-menu-btn" id="mobile-menu-btn" title="메뉴" aria-label="사이드바 메뉴 열기" aria-controls="sidebar" aria-expanded="false">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div id="sidebar-backdrop"></div>

<!-- ════════ Sidebar ════════ -->
<div id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <div class="logo-icon">VC</div>
      <span class="logo-text">Vibe Coding</span>
    </div>
    <div class="sidebar-actions">
      <button class="icon-btn" id="settings-btn" title="설정" aria-label="설정 열기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="icon-btn" id="logout-btn" title="로그아웃" aria-label="로그아웃">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <button class="icon-btn" id="toggle-sidebar" title="사이드바 토글" aria-label="사이드바 토글" aria-controls="sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="sidebar-search">
    <div class="search-input-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="채팅 검색..." aria-label="채팅 검색">
    </div>
    <button class="sidebar-search-mini" id="sidebar-search-mini"
            title="채팅 검색" aria-label="채팅 검색"
            onclick="(function(){ const s=document.getElementById('sidebar'); s&&s.classList.remove('collapsed'); const i=document.getElementById('search-input'); i&&i.focus(); })()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-nav">
    <button class="nav-item" id="new-chat-btn" aria-label="새 채팅 시작">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span class="nav-label">새 채팅</span>
    </button>
    <button class="nav-item" onclick="openModal('notes-modal')" aria-label="노트 열기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="nav-label">노트</span>
    </button>
  </div>

  <div class="chat-list-wrapper">
    <div class="sidebar-section-title is-hidden" id="pinned-title">고정됨</div>
    <div class="chat-list" id="pinned-list"></div>

    <div class="sidebar-section-title">채팅</div>
    <div class="chat-list" id="chat-list"></div>
  </div>

</div>

<!-- ════════ Main ════════ -->
<div id="main">
  <div id="chat-container">
    <div id="welcome">
      <div class="welcome-icon">VC</div>
      <div class="welcome-title">무엇을 도와드릴까요?</div>
      <div class="suggestions">
        <div class="suggestion-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          제안
        </div>
        <button type="button" class="suggestion-item" onclick="useSuggestion('간단한 할 일 목록 앱을 HTML/CSS/JS로 만들어줘')">
          <div class="suggestion-main">간단한 할 일 목록 앱을 만들어줘</div>
          <div class="suggestion-sub">HTML/CSS/JS로 완성된 앱</div>
        </button>
        <button type="button" class="suggestion-item" onclick="useSuggestion('애니메이션이 있는 로딩 스피너를 CSS로 만들어줘')">
          <div class="suggestion-main">CSS 로딩 스피너 만들어줘</div>
          <div class="suggestion-sub">애니메이션 효과 포함</div>
        </button>
        <button type="button" class="suggestion-item" onclick="useSuggestion('반응형 카드 그리드 레이아웃을 만들어줘')">
          <div class="suggestion-main">반응형 카드 그리드 레이아웃</div>
          <div class="suggestion-sub">CSS Grid 사용</div>
        </button>
      </div>
    </div>
    <div id="messages"></div>
  </div>

  <div id="input-area">
    <div class="attachment-preview" id="attachment-preview"></div>
    <div id="input-wrapper">
      <textarea id="chat-input" placeholder="무엇을 도와드릴까요?" rows="1" aria-label="메시지 입력"></textarea>
      <div class="input-actions">
        <div class="input-left">
          <button class="action-btn" id="attach-btn" title="파일 첨부" aria-label="파일 첨부">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <select id="run-mode-select" class="run-mode-select" title="실행 모드" aria-label="실행 모드 선택">
            <option value="confirm">확인 후 진행</option>
            <option value="auto">바로 진행</option>
          </select>
        </div>
        <button id="send-btn" title="전송 (Enter)" aria-label="메시지 전송" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈 · Ctrl+N 새 채팅 · Ctrl+K 검색</div>
  </div>
  <input type="file" class="hidden-file-input" id="file-input" accept="image/*,.pdf,.txt,.md" multiple>
</div>

<!-- ════════ Preview Panel ════════ -->
<div id="preview-panel">
  <div class="preview-panel-resizer" id="preview-panel-resizer" role="separator" aria-orientation="vertical" title="패널 폭 조절"></div>
  <div class="preview-header">
    <div class="preview-tabs">
      <button class="preview-tab active" data-tab="preview" onclick="switchPreviewTab('preview')">코드 + 실행</button>
      <button class="preview-tab is-hidden" id="show-run-btn" onclick="showRunPane()" title="실행 패널 다시 열기" aria-label="실행 패널 다시 열기">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        실행
      </button>
    </div>
    <button class="icon-btn" onclick="closePreview()" title="코드+실행 패널 닫기" aria-label="코드+실행 패널 닫기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="preview-split">
    <div class="preview-code-pane">
      <div class="preview-file-tabs" id="preview-file-tabs"></div>
      <div class="preview-monaco" id="preview-monaco"></div>
    </div>
    <div class="preview-resizer" id="preview-resizer" role="separator" aria-orientation="vertical"></div>
    <div class="preview-run-pane">
      <button class="run-pane-close" onclick="hideRunPane()" title="실행 패널 닫기" aria-label="실행 패널 닫기">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <iframe id="preview-frame" title="생성된 코드 미리보기" sandbox="allow-scripts"></iframe>
    </div>
  </div>
</div>

<!-- ════════ Settings Modal ════════ -->
<div class="modal-backdrop" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">설정</div>
      <button class="icon-btn" onclick="closeModal('settings-modal')" aria-label="설정 닫기" title="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="general" onclick="switchSettingsTab('general')">일반</button>
      <button class="settings-tab" data-tab="memory" onclick="switchSettingsTab('memory')">기억</button>
    </div>
    <div class="modal-body">
      <div class="settings-section active" id="section-general">
        <div class="setting-row">
          <div>
            <div class="setting-label">테마</div>
            <div class="setting-desc">다크 / 라이트 / 기기 설정에 따름</div>
          </div>
          <select class="select-input" id="theme-select">
            <option value="dark">다크</option>
            <option value="light">라이트</option>
            <option value="system">시스템 설정</option>
          </select>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">대화 내보내기</div>
            <div class="setting-desc">모든 채팅을 JSON 파일로 다운로드</div>
          </div>
          <button class="modal-btn" onclick="exportAllChats()">내보내기</button>
        </div>
      </div>
      <div class="settings-section" id="section-memory">
        <div class="setting-desc" style="margin-bottom: 12px;">
          모델이 매 대화마다 참고할 영속 기억 항목입니다. 한 줄에 한 개씩 적어주세요.
        </div>
        <div id="memory-list"></div>
        <button class="modal-btn" id="memory-add-btn" type="button">＋ 항목 추가</button>
        <div style="margin-top: 14px; display: flex; justify-content: flex-end;">
          <button class="modal-btn primary" id="memory-save-btn" type="button">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════ Notes Modal ════════ -->
<div class="modal-backdrop" id="notes-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">노트</div>
      <button class="icon-btn" onclick="closeModal('notes-modal')" aria-label="노트 닫기" title="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <textarea class="textarea-input notes-textarea" id="notes-textarea" placeholder="여기에 메모를 작성하세요..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-btn primary" onclick="saveNotes()">저장</button>
    </div>
  </div>
</div>

<!-- ════════ Model Modal ════════ -->
<div class="modal-backdrop" id="model-modal">
  <div class="modal compact">
    <div class="modal-header">
      <div class="modal-title">모델 선택</div>
      <button class="icon-btn" onclick="closeModal('model-modal')" aria-label="모델 선택 닫기" title="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="prompt-list" id="model-list"></div>
    </div>
  </div>
</div>

<!-- Context menu, toast -->
<div class="context-menu" id="context-menu" role="menu" aria-hidden="true"></div>
<div class="toast-container" id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

<script src="/assets/preview_core.js"></script>
<script src="/assets/main.js"></script>
</body>
</html>
